name: build

# Cloud CI verifies the source only — it does NOT produce a .cod. rapc and
# net_rim_api.jar are RIM proprietary tools (Windows binaries incl. preverify)
# that cannot run on hosted Linux runners, so the .cod is built locally with the
# BlackBerry JDE on Windows (see README "Build"). These jobs guarantee the
# source stays CLDC-compatible and type-checks before you build.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Enforces the CLDC 1.1 / MIDP 2.0 source constraints from CLAUDE.md.
  guardrails:
    name: CLDC guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce CLDC/MIDP source constraints
        run: sh tools/check-cldc.sh

  # Compiles (type-checks) src/ against the compile-only API stubs in ci/stubs/
  # using a stock JDK. Catches bad signatures, missing methods, and type
  # mismatches that the grep guardrail cannot. Does NOT produce a .cod.
  compile:
    name: Type-check (stub compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile against API stubs
        run: sh ci/compile-check.sh
      - name: Upload type-check classes
        uses: actions/upload-artifact@v4
        with:
          name: bbtime-classes-typecheck
          path: build/ci-classes/**/*.class
          if-no-files-found: error
